<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Coffee | Carrito</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <button class="hamburger" onclick="toggleMenu()">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <ul class="nav">
            <li><a href="index.html">Inicio</a></li>

            <li>
                <a href="#">Menú</a>
                <ul>
                    <li><a href="Bebidas.html">Bebidas</a></li>
                    <li><a href="Postres.html">Panadería y Postres</a></li>
                    <li><a href="Comidas.html">Comidas</a></li>
                </ul>
            </li>

            <li><a href="pedidos.html">Pedidos</a></li>
            <li><a href="ubicaciones.html">Ubicaciones</a></li>
            <li><a href="info.html">Acerca de Nosotros</a></li>
            <li><a href="horario.html">Horarios</a></li>
            <li><a href="carrito.html">🛒</a></li>
        </ul>
    </nav>

    <a href="index.html" class="back">
        ← Volver
    </a>

    <section class="container">

        <h1 class="title">🛒 Tu Carrito</h1>

        <div id="carrito"></div>

        <div class="total-box">

            <h2>Total</h2>

            <div class="total" id="total">
                Q 0
            </div>

            <div class="buttons">

                <button class="vaciar" onclick="vaciarCarrito()">
                    Vaciar carrito
                </button>

                <a href="checkout.html">
                    <button class="comprar" id="btnComprar">
                        Finalizar Compra 💳
                    </button>
                </a>

            </div>

            <div class="mensaje" id="mensajeCompra">
                ✅ Tu compra está lista.
                <br>
                Gracias por confiar en AC Coffee.
            </div>

        </div>

    </section>

    <script>

        function toggleMenu() {
            document.querySelector(".nav").classList.toggle("active");
        }

        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        function renderCarrito() {

            const contenedor = document.getElementById("carrito");
            const totalElemento = document.getElementById("total");
            const btnComprar = document.getElementById("btnComprar");

            contenedor.innerHTML = "";

            let total = 0;

            if (carrito.length === 0) {

                contenedor.innerHTML = `
                    <h2 style="text-align:center;color:#888;">
                        Tu carrito está vacío ☕
                    </h2>
                `;

                btnComprar.style.display = "none";
            } else {

                carrito.forEach((producto, index) => {

                    total += producto.precio;

                    contenedor.innerHTML += `
                        <div class="producto">

                            <img src="${producto.imagen}" alt="${producto.nombre}">

                            <div class="info">
                                <h3>${producto.nombre}</h3>
                                <p class="price">
                                    Q ${producto.precio.toLocaleString()}
                                </p>
                            </div>

                            <button
                                class="delete"
                                onclick="eliminar(${index})">
                                Eliminar
                            </button>

                        </div>
                    `;

                });

                btnComprar.style.display = "inline-block";
            }

            totalElemento.innerText = "Q " + total.toLocaleString();
        }

        function eliminar(index) {

            carrito.splice(index, 1);

            localStorage.setItem("carrito", JSON.stringify(carrito));

            renderCarrito();

        }

        function vaciarCarrito() {

            carrito = [];

            localStorage.setItem("carrito", JSON.stringify(carrito));

            document.getElementById("mensajeCompra").style.display = "none";

            renderCarrito();

        }

        function compraLista() {

            document.getElementById("mensajeCompra").style.display = "block";

        }

        renderCarrito();

    </script>

</body>

</html>
